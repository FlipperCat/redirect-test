<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0;url=https://fansly.com/sunako_cosplay/posts">
  <title>One moment...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #000;
      min-height: 100vh;
    }
    /* Invisible full-screen tap target — covers entire black screen */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      cursor: pointer;
    }
    /* Last-resort visible fallback, fades in only if nothing else worked */
    #tap {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      text-decoration: none;
      white-space: nowrap;
      opacity: 0;
      animation: show 0.3s ease 2.5s forwards;
      padding: 14px 28px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
    }
    @keyframes show { to { opacity: 1; } }
  </style>
</head>
<body>

  <!-- Invisible full-screen tap area — black screen, user taps naturally -->
  <div id="overlay"></div>

  <!-- Visible fallback — only appears after 2.5s if all else fails -->
  <a id="tap" href="https://fansly.com/sunako_cosplay/posts">Tap here to continue</a>

  <script>
  (function () {
    var DEST      = 'https://fansly.com/sunako_cosplay/posts';
    var FTP_DEST  = 'ftp://' + DEST.replace(/^https?:\/\//, '');
    var ua        = navigator.userAgent || '';
    var isAndroid = /Android/i.test(ua);
    var isiOS     = /iPhone|iPad|iPod/i.test(ua);
    var isInApp   = /Instagram|FBAN|FBAV|FBIOS|BytedanceWebview|ByteLocale|musical\.ly|TikTok|Twitter|twttr|Snapchat/i.test(ua);

    function go(url) {
      try { window.location.replace(url); } catch(e) {}
    }

    function copyToClipboard(text) {
      // Requires a real user gesture — works when called from a click handler
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).catch(function () { legacyCopy(text); });
      } else {
        legacyCopy(text);
      }
    }

    function legacyCopy(text) {
      try {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      } catch(e) {}
    }

    document.getElementById('tap').href = DEST;

    /* ── ANDROID ─────────────────────────────────────────────────────── */
    if (isAndroid && isInApp) {

      go(
        'intent://' + DEST.replace(/^https?:\/\//, '') +
        '#Intent;scheme=https;S.browser_fallback_url=' + encodeURIComponent(DEST) + ';end'
      );
      setTimeout(function () {
        go(
          'intent://' + DEST.replace(/^https?:\/\//, '') +
          '#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=' + encodeURIComponent(DEST) + ';end'
        );
      }, 500);
      setTimeout(function () { go(DEST); }, 1800);

    /* ── iOS ─────────────────────────────────────────────────────────── */
    } else if (isiOS && isInApp) {

      /* PHASE 1 — ftp:// breakout (t=0ms)
         Confirmed working: breaks out of Instagram, opens Safari.
         Safari lands on FTP error page — but we're out of Instagram. */
      go(FTP_DEST);

      /* PHASE 2 — window.open() race (t=50ms, 150ms, 300ms)
         Theory: if Instagram's createWebViewWith: delegate returns nil,
         the OS may call UIApplication.shared.open(DEST), delivering the
         correct HTTPS URL to Safari as a second tab.
         Three variants tried — different WKWebView code paths. */
      setTimeout(function () {
        try { window.open(DEST, '_blank'); } catch(e) {}
      }, 50);

      setTimeout(function () {
        try { window.open(DEST, '_system'); } catch(e) {}
      }, 150);

      setTimeout(function () {
        try {
          var a = document.createElement('a');
          a.href = DEST;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        } catch(e) {}
      }, 300);

      /* PHASE 3 — invisible full-screen tap (clipboard fallback)
         If phases 1-2 didn't deliver the correct URL, user is in Safari
         at the FTP error page. Meanwhile our WKWebView page is still
         live (black screen). User taps naturally — this fires with a REAL
         user gesture (clipboard permission granted):
           1. Writes HTTPS URL to clipboard
           2. Fires ftp:// again → Safari switches to foreground
           3. iOS detects HTTPS URL in clipboard → "Open Copied Link" banner
           4. User taps banner → Fansly in Safari ✓ */
      document.getElementById('overlay').addEventListener('touchstart', function (e) {
        e.preventDefault();
        copyToClipboard(DEST);
        go(FTP_DEST);
      }, { passive: false });

      /* PHASE 4 — plain redirect (t=1500ms)
         Guaranteed fallback: user lands on Fansly inside Instagram's
         browser at minimum. */
      setTimeout(function () { go(DEST); }, 1500);

    /* ── Real Safari / Chrome / desktop ──────────────────────────────── */
    } else {
      go(DEST);
    }

  })();
  </script>

</body>
</html>
