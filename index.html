<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening link...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #e91e8c, #9c27b0);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg { width: 36px; height: 36px; fill: #fff; }
    h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
    p  { font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 24px; }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #1a1a1a;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 12px;
      cursor: pointer;
      border: none;
      margin-bottom: 10px;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.75; }
    .btn.secondary {
      background: transparent;
      color: #1a1a1a;
      border: 1px solid #ddd;
    }
    .note { margin-top: 12px; font-size: 12px; color: #aaa; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #eee;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24"><path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42L17.59 5H14V3zM5 5h6v2H5v12h12v-6h2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"/></svg>
  </div>
  <h1 id="title">Opening your browser…</h1>
  <p  id="subtitle">Trying to redirect you automatically.</p>

  <div class="spinner" id="spinner"></div>

  <!-- shown after auto-attempt fails -->
  <div id="manual" class="hidden">
    <button class="btn" id="btn-chrome">Open in Chrome</button>
    <button class="btn" id="btn-firefox">Open in Firefox</button>
    <button class="btn" id="btn-edge">Open in Edge</button>
    <button class="btn" id="btn-brave">Open in Brave</button>
    <a    class="btn secondary" id="btn-direct" href="#">Open in browser</a>
    <p class="note">Tap the button for your browser above.</p>
  </div>
</div>

<script>
(function () {
  var DEST = 'https://fansly.com/sunako_cosplay/posts';
  var host = DEST.replace(/^https?:\/\//, ''); // fansly.com/sunako_cosplay/posts

  var ua        = navigator.userAgent || '';
  var isAndroid = /Android/i.test(ua);
  var isiOS     = /iPhone|iPad|iPod/i.test(ua);
  var isInApp   = /Instagram|FBAN|FBAV|FBIOS|BytedanceWebview|ByteLocale|musical\.ly|TikTok|Twitter|twttr|Snapchat/i.test(ua);

  // iOS schemes — exact match from browser-switcher dist/index.min.js
  var schemes = {
    chrome:   'googlechromes://'              + host,
    firefox:  'firefox://open-url?url=https://' + host,
    brave:    'brave://open-url?url=https://'   + host,
    edge:     'microsoft-edge-https://'       + host,
    opera:    'touch-https://'                + host,
    operagx:  'opera-gx://open-url?url=https://' + host,
    ddg:      'ddgQuickLink://'              + host,
    safari:   'x-safari-https://'            + host
  };

  // Android intent — replicated from browser-switcher source
  function androidIntent(pkg) {
    return 'intent://' + host + '#Intent;scheme=https;package=' + pkg + ';S.browser_fallback_url=' + encodeURIComponent(DEST) + ';end';
  }

  function go(url) {
    try { window.location.href = url; } catch(e) {} // matches library 'href' method
  }

  function showManual() {
    document.getElementById('spinner').classList.add('hidden');
    document.getElementById('title').textContent = 'Open in your browser';
    document.getElementById('subtitle').textContent = 'Auto-redirect failed. Choose your browser below.';
    document.getElementById('manual').classList.remove('hidden');
  }

  // Wire up manual buttons
  document.getElementById('btn-direct').href = DEST;

  document.getElementById('btn-chrome').addEventListener('click', function() {
    go(isiOS ? schemes.chrome  : androidIntent('com.android.chrome'));
  });
  document.getElementById('btn-firefox').addEventListener('click', function() {
    go(isiOS ? schemes.firefox : androidIntent('org.mozilla.firefox'));
  });
  document.getElementById('btn-edge').addEventListener('click', function() {
    go(isiOS ? schemes.edge    : androidIntent('com.microsoft.emmx'));
  });
  document.getElementById('btn-brave').addEventListener('click', function() {
    go(isiOS ? schemes.brave   : androidIntent('com.brave.browser'));
  });

  // ── Not in-app: redirect straight to destination ───────────────────
  if (!isInApp) {
    window.location.replace(DEST);
    return;
  }

  // ── Android in-app ─────────────────────────────────────────────────
  if (isAndroid) {
    go(androidIntent('com.android.chrome'));
    setTimeout(function() { go(androidIntent('com.android.browser')); }, 600);
    setTimeout(function() { window.location.replace(DEST); }, 1500);
    setTimeout(showManual, 2000);
    return;
  }

  // ── iOS in-app ─────────────────────────────────────────────────────
  // Cascade through every browser scheme. visibilitychange fires the
  // moment any scheme successfully hands off to an installed app —
  // we use that to cancel remaining attempts.
  if (isiOS) {
    var done = false;

    document.addEventListener('visibilitychange', function() {
      if (document.hidden) done = true;
    });

    var attempts = [
      schemes.safari,   // x-safari-https:// first — library default for iOS
      schemes.chrome,
      schemes.firefox,
      schemes.brave,
      schemes.edge,
      schemes.opera,
      schemes.operagx,
      schemes.ddg
    ];

    // Fire first attempt immediately
    go(attempts[0]);

    // Queue remaining attempts 500ms apart
    for (var i = 1; i < attempts.length; i++) {
      (function(scheme, delay) {
        setTimeout(function() {
          if (!done) go(scheme);
        }, delay);
      })(attempts[i], i * 500);
    }

    // After all schemes tried, show manual buttons
    setTimeout(function() {
      if (!done) showManual();
    }, attempts.length * 500 + 300);

    return;
  }

  // ── Fallback (desktop etc) ─────────────────────────────────────────
  window.location.replace(DEST);

})();
</script>
</body>
</html>
