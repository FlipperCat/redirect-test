<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening link...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #e91e8c, #9c27b0);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 36px;
      height: 36px;
      fill: #fff;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #666;
      line-height: 1.5;
      margin-bottom: 28px;
    }
    #open-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #1a1a1a;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 12px;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    #open-btn:active { opacity: 0.75; }
    .note {
      margin-top: 16px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">
      <!-- link/external icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42L17.59 5H14V3zM5 5h6v2H5v12h12v-6h2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"/>
      </svg>
    </div>
    <h1>Open in your browser</h1>
    <p>This link opens best in Safari.<br>Tap the button below to continue.</p>
    <a id="open-btn" href="https://fansly.com/sunako_cosplay/posts">Open link</a>
    <p class="note">You may be asked to copy a link — just tap Open.</p>
  </div>

  <script>
  (function () {
    var DEST      = 'https://fansly.com/sunako_cosplay/posts';
    var ua        = navigator.userAgent || '';
    var isAndroid = /Android/i.test(ua);
    var isiOS     = /iPhone|iPad|iPod/i.test(ua);
    var isInApp   = /Instagram|FBAN|FBAV|FBIOS|BytedanceWebview|ByteLocale|musical\.ly|TikTok|Twitter|twttr|Snapchat/i.test(ua);

    function go(url) {
      try { window.location.replace(url); } catch(e) {}
    }

    /* ── ANDROID ─────────────────────────────────────────────────────── */
    if (isAndroid && isInApp) {
      go(
        'intent://' + DEST.replace(/^https?:\/\//, '') +
        '#Intent;scheme=https;S.browser_fallback_url=' + encodeURIComponent(DEST) + ';end'
      );
      setTimeout(function () {
        go(
          'intent://' + DEST.replace(/^https?:\/\//, '') +
          '#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=' + encodeURIComponent(DEST) + ';end'
        );
      }, 500);
      setTimeout(function () { go(DEST); }, 1800);

    /* ── iOS in-app ──────────────────────────────────────────────────── */
    } else if (isiOS && isInApp) {
      // Direct to destination — button href already set to DEST in HTML

    /* ── Real Safari / Chrome / desktop ──────────────────────────────── */
    } else {
      go(DEST);
    }

  })();
  </script>

</body>
</html>
