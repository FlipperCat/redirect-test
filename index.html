<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening link...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #e91e8c, #9c27b0);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 36px;
      height: 36px;
      fill: #fff;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #666;
      line-height: 1.5;
      margin-bottom: 28px;
    }
    #fallback-btn {
      display: none;
      width: 100%;
      padding: 16px;
      background: #1a1a1a;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 12px;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    #fallback-btn:active { opacity: 0.75; }
    .note {
      margin-top: 16px;
      font-size: 12px;
      color: #aaa;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #eee;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42L17.59 5H14V3zM5 5h6v2H5v12h12v-6h2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"/>
      </svg>
    </div>
    <h1>Opening your browser...</h1>
    <p>Redirecting you to the link.<br>This only takes a moment.</p>
    <div class="spinner" id="spinner"></div>
    <a id="fallback-btn" href="https://fansly.com/sunako_cosplay/posts">Open link manually</a>
    <p class="note" id="note"></p>
  </div>

  <script src="https://unpkg.com/browser-switcher/dist/index.min.js"></script>
  <script>
  (function () {
    var DEST = 'https://fansly.com/sunako_cosplay/posts';

    var btn     = document.getElementById('fallback-btn');
    var spinner = document.getElementById('spinner');
    var note    = document.getElementById('note');

    // Show fallback button after 2 seconds if auto-redirect hasn't worked
    var fallbackTimer = setTimeout(function () {
      spinner.style.display = 'none';
      btn.style.display = 'block';
      note.textContent = 'Auto-redirect failed. Tap the button above.';
    }, 2000);

    function tryRedirect() {
      // Resolve the API — script tag exposes BrowserSwitcher or BrowserSwitcher.default
      var lib = (typeof BrowserSwitcher !== 'undefined')
        ? (BrowserSwitcher.default || BrowserSwitcher)
        : null;

      if (!lib) {
        // Library failed to load — fall back immediately
        clearTimeout(fallbackTimer);
        spinner.style.display = 'none';
        btn.style.display = 'block';
        return;
      }

      var isInApp = lib.isInAppBrowser ? lib.isInAppBrowser() : false;

      if (!isInApp) {
        // Not in an in-app browser — redirect directly
        clearTimeout(fallbackTimer);
        window.location.replace(DEST);
        return;
      }

      var platform = lib.detectPlatform ? lib.detectPlatform() : 'unknown';

      try {
        if (platform === 'ios') {
          // Try Chrome first (correct URL if installed), then Safari
          try {
            lib.open({ targetUrl: DEST, browser: 'chrome', platform: 'ios' });
          } catch (e) {}
          setTimeout(function () {
            try {
              lib.open({ targetUrl: DEST, browser: 'safari', platform: 'ios' });
            } catch (e) {}
          }, 400);
        } else if (platform === 'android') {
          lib.open({ targetUrl: DEST, browser: 'chrome', platform: 'android' });
        } else {
          window.location.replace(DEST);
        }
      } catch (err) {
        // All attempts failed — fallback button already showing after 2s
      }
    }

    // Fallback button: plain navigation, no JS — always works
    btn.href = DEST;

    tryRedirect();
  })();
  </script>

</body>
</html>
