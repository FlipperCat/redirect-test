<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--
    0-second meta refresh.
    Fires before JavaScript parses. Sends user to Fansly.
    On real Safari: Fansly's own Universal Links intercept this navigation
    and open the Fansly app directly (if installed).
    Fallback for any environment where JS is blocked.
  -->
  <meta http-equiv="refresh" content="0;url=https://fansly.com/sunako_cosplay/posts">

  <title>One moment...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #tap {
      color: #fff;
      font-size: 17px;
      font-weight: 500;
      text-decoration: none;
      opacity: 0;
      animation: show 0.3s ease 2s forwards;
      padding: 14px 28px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
    }
    @keyframes show { to { opacity: 1; } }
  </style>
</head>
<body>

  <a id="tap" href="https://fansly.com/sunako_cosplay/posts">Tap here to continue</a>

  <script>
  (function () {
    var DEST    = 'https://fansly.com/sunako_cosplay/posts';
    var ua      = navigator.userAgent || '';
    var isAndroid = /Android/i.test(ua);
    var isiOS     = /iPhone|iPad|iPod/i.test(ua);
    var isInApp   = /Instagram|FBAN|FBAV|FBIOS|BytedanceWebview|ByteLocale|musical\.ly|TikTok|Twitter|twttr|Snapchat/i.test(ua);

    function go(url) {
      try { window.location.replace(url); } catch(e) {}
    }

    document.getElementById('tap').href = DEST;

    /* ── ANDROID ───────────────────────────────────────────────────────── */
    if (isAndroid && isInApp) {
      // Pass 1: let Android choose the default browser
      go(
        'intent://' + DEST.replace(/^https?:\/\//, '') +
        '#Intent;scheme=https;S.browser_fallback_url=' + encodeURIComponent(DEST) + ';end'
      );
      // Pass 2: explicitly target Chrome
      setTimeout(function () {
        go(
          'intent://' + DEST.replace(/^https?:\/\//, '') +
          '#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=' + encodeURIComponent(DEST) + ';end'
        );
      }, 500);
      setTimeout(function () { go(DEST); }, 1800);

    /* ── iOS ────────────────────────────────────────────────────────────── */
    } else if (isiOS && isInApp) {
      // Attempt: open Fansly app directly via its custom URL scheme.
      // If the user has the Fansly app installed, this opens it immediately
      // without going through any browser at all.
      go('fansly://sunako_cosplay/posts');

      // Fallback: navigate to the HTTPS URL.
      // From Instagram's browser this loads Fansly in-app.
      // From real Safari this triggers Fansly's own Universal Links → Fansly app.
      setTimeout(function () { go(DEST); }, 600);

    /* ── Everything else (real Safari, Chrome, desktop) ────────────────── */
    } else {
      go(DEST);
    }

  })();
  </script>

</body>
</html>
