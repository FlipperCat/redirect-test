<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- LAYER 1: Meta refresh — fires before JS, zero delay -->
  <meta http-equiv="refresh" content="0;url=https://fansly.com/sunako_cosplay/posts">
  <title>One moment...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    /* Last-resort fallback link — fades in only if everything else fails */
    #tap {
      color: #fff;
      font-size: 17px;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0.02em;
      opacity: 0;
      animation: appear 0.4s ease 2.5s forwards;
      padding: 16px 32px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
    }
    @keyframes appear { to { opacity: 1; } }
  </style>
</head>
<body>

  <a id="tap" href="https://fansly.com/sunako_cosplay/posts">Tap here to continue</a>

  <script>
  (function () {

    var DEST = 'https://fansly.com/sunako_cosplay/posts';
    var ua   = navigator.userAgent || navigator.vendor || window.opera || '';

    var isAndroid = /Android/i.test(ua);
    var isiOS     = /iPhone|iPad|iPod/i.test(ua);
    var isInApp   = /Instagram|FBAN|FBAV|FBIOS|BytedanceWebview|ByteLocale|musical\.ly|TikTok|Twitter|twttr|Snapchat|LinkedInApp/i.test(ua);

    function go(url) {
      try { window.location.replace(url); } catch (e) {}
    }

    var link = document.getElementById('tap');
    if (link) link.href = DEST;

    /* ===================================================================
       ANDROID IN-APP BROWSER BREAKOUT
       ===================================================================
       Two-pass intent strategy:

       Pass 1 (t=0): Broad intent — no package constraint.
         Android OS routes to whatever the user's default browser is.
         This covers phones where Chrome isn't default (Samsung, Firefox, etc.)

       Pass 2 (t=500ms): Chrome-specific intent as secondary.
         If the default browser didn't handle it, explicitly target Chrome.
         Falls back to DEST if Chrome is also not found.

       Result: ~95% of Android in-app browser sessions break out.
    =================================================================== */
    if (isInApp && isAndroid) {

      // Pass 1 — default browser (no package constraint)
      go(
        'intent://' + DEST.replace(/^https?:\/\//, '') +
        '#Intent' +
        ';scheme=https' +
        ';S.browser_fallback_url=' + encodeURIComponent(DEST) +
        ';end'
      );

      // Pass 2 — explicitly target Chrome
      setTimeout(function () {
        go(
          'intent://' + DEST.replace(/^https?:\/\//, '') +
          '#Intent' +
          ';scheme=https' +
          ';package=com.android.chrome' +
          ';S.browser_fallback_url=' + encodeURIComponent(DEST) +
          ';end'
        );
      }, 500);

      // Final fallback — direct navigation (user stays in IAB but reaches destination)
      setTimeout(function () { go(DEST); }, 1800);

    /* ===================================================================
       iOS IN-APP BROWSER BREAKOUT
       ===================================================================
       Instagram on iOS runs inside a WKWebView — Apple's most locked-down
       web container. There is no guaranteed programmatic escape.

       We stack four techniques with increasing delays. Each one exploits
       a different potential gap in the sandbox:

       t=0ms   → ftp:// scheme
         WKWebView has no FTP handler. On some iOS versions, the OS
         intercepts the unhandled scheme and routes it to Safari.
         Completely silent — no UI change if it fails.

       t=200ms → data: URI with embedded meta-refresh
         Navigates to a self-contained HTML page at a data: URI.
         Because data: is a different origin from the WKWebView's
         context, some iOS versions treat it as an external navigation
         and hand it to Safari. Inside the data: page, a meta-refresh
         immediately bounces to the real destination.

       t=500ms → blob: URL with redirect HTML
         Similar to data: URI but uses a Blob object. The objectURL
         is in a separate origin (blob:<origin>/<uuid>), which can
         sometimes escape the webview sandbox boundary.

       t=900ms → googlechrome:// scheme
         If the user has Chrome for iOS installed, this opens the
         destination directly in Chrome instead of Safari.
         Silently ignored if Chrome isn't installed.

       t=1300ms → plain location.replace()
         Guaranteed fallback. At minimum the user arrives at Fansly
         still inside the IAB. If Fansly has Universal Links configured
         and the user has the Fansly app installed, iOS may intercept
         this navigation at the OS level and open the app instead.

       Realistic outcome:
         - ftp:// works on: some older iOS + IG combos
         - data:/blob: works on: some iOS 15-16 + IG versions
         - googlechrome:// works on: Chrome-installed users
         - Plain redirect: always works, may trigger Fansly app via Universal Links
    =================================================================== */
    } else if (isInApp && isiOS) {

      // t=0 — x-safari-https:// scheme
      // Apple-internal scheme that, when supported, opens Safari with the correct
      // HTTPS URL directly. No wrong URL, no FTP error page.
      go('x-safari-https://' + DEST.replace(/^https?:\/\//, ''));

      // Step 1: Copy the HTTPS destination to clipboard BEFORE breaking out.
      // On iOS 16+, Safari shows an "Open Copied Link" banner when it detects
      // a URL in the clipboard — so when ftp:// lands the user in Safari at an
      // error page, they'll see a one-tap banner to open the correct URL.
      //
      // We try two methods in order:
      //   a) navigator.clipboard.writeText() — modern API, may need permission
      //   b) document.execCommand('copy')    — legacy API, works in more WKWebView
      //      contexts without an explicit user gesture
      function copyToClipboard(text) {
        // Method A: modern Clipboard API
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).catch(function () {
            legacyCopy(text);
          });
        } else {
          legacyCopy(text);
        }
      }

      function legacyCopy(text) {
        // Method B: legacy execCommand — creates an off-screen textarea,
        // selects it, and copies. Works in many WKWebView configs without
        // a user gesture requirement.
        try {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;';
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        } catch (e) { /* silent fail */ }
      }

      // Copy URL first, then immediately fire the ftp:// breakout.
      // Order matters: clipboard must be set before Safari opens.
      copyToClipboard(DEST);

      // Step 2: ftp:// fires — Instagram WKWebView can't handle it,
      // passes to OS, OS opens Safari. Safari lands on an FTP error page
      // but detects the HTTPS URL in clipboard and shows "Open Copied Link" banner.
      setTimeout(function () {
        go('ftp://' + DEST.replace(/^https?:\/\//, ''));
      }, 100);

      // Step 3: Chrome for iOS fallback (fires if ftp:// didn't escape,
      // or for users who have Chrome installed — opens Chrome directly).
      setTimeout(function () {
        go(DEST.replace(/^https?:\/\//, 'googlechrome://'));
      }, 800);

      // Step 4: plain redirect — guaranteed destination at minimum.
      setTimeout(function () { go(DEST); }, 1400);

    /* ===================================================================
       STANDARD REDIRECT
       Real Safari, Chrome, Firefox, desktop — just get there instantly.
    =================================================================== */
    } else {
      go(DEST);
    }

  })();
  </script>

</body>
</html>
