# Netlify configuration for Ghost Bridge redirect page

[build]
  publish = "."

# Disable all caching on the redirect page.
# Without this, Netlify's CDN will cache the HTML and your link
# updates will take hours to propagate — defeating the purpose.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control      = "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"
    Pragma             = "no-cache"
    Expires            = "0"
    X-Frame-Options    = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy    = "no-referrer"
