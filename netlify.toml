[build]
  publish = "."

# Serve AASA without .json extension as application/json
# Required by Apple — wrong Content-Type causes iOS to reject the file silently
[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type  = "application/json"
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

# Serve Android assetlinks
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type  = "application/json"
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

# No-cache everything else — redirect changes take effect instantly
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"
    Pragma        = "no-cache"
    Expires       = "0"
